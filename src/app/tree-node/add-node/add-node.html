<h2 mat-dialog-title>
  {{
    'Dodaj ' + addType === 'child'
      ? 'dijete na '
      : 'roditelja ' + 'elementu: "' + node().label + '"'
  }}
</h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>Naziv</mat-label>
    <input matInput />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onCancelClick()">Odustani</button>
  <button matButton (click)="onAddClick()" [mat-dialog-close]="true" cdkFocusInitial>Dodaj</button>
</mat-dialog-actions>
