<h2 mat-dialog-title>
  {{
    'Dodaj ' +
      (addType() === 'child'
        ? 'dijete na element "' + node().label + '"'
        : addType() === 'parent'
          ? 'roditelja elementu "' + node().label + '"'
          : ' korijenski element')
  }}
</h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>Naziv</mat-label>
    <input [(ngModel)]="label" matInput />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onCancelClick()">Odustani</button>
  <button matButton (click)="onAddClick()" [mat-dialog-close]="label()" cdkFocusInitial>
    Dodaj
  </button>
</mat-dialog-actions>
