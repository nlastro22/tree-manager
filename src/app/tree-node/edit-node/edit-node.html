<h2 mat-dialog-title>Promijeni naziv</h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>Naziv</mat-label>
    <input [(ngModel)]="label" #newLabel="ngModel" matInput [value]="label()" />
  </mat-form-field>
  @if (newLabel.invalid && newLabel.touched) {
    <mat-error>{{
      newLabel.errors?.['required'] ? 'Naziv je obavezan' : 'Minimalno 2 znaka'
    }}</mat-error>
  }
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onCancelClick()">Odustani</button>
  <button matButton [mat-dialog-close]="newLabel.value" cdkFocusInitial>Spremi</button>
</mat-dialog-actions>
