<h2 mat-dialog-title>Promijeni naziv</h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>Naziv</mat-label>
    <input #newLabel matInput [value]="label()" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onCancelClick()">Odustani</button>
  <button matButton [mat-dialog-close]="newLabel" cdkFocusInitial>Spremi</button>
</mat-dialog-actions>
