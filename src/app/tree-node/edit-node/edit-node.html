<h2 mat-dialog-title>Uredite element</h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>Naziv</mat-label>
    <input [(ngModel)]="label" matInput />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onCancelClick()">Odustani</button>
  <button matButton (click)="onSaveClick()" [mat-dialog-close]="label()" cdkFocusInitial>
    Spremi
  </button>
</mat-dialog-actions>
